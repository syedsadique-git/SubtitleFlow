<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SubtitleFlow</title>
    <!--
      SPA deep-link fallback for GitHub Pages.

      GitHub Pages serves static files only, so a refresh of a client-side
      route like /SubtitleFlow/pricing would normally 404. This page catches
      those requests, encodes the intended path, and redirects to the app root,
      where the script in index.html restores it so React Router can take over.
      Convention: the segment count below (4) plus the repo path
      "/SubtitleFlow/" must match the deployed location.
    -->
    <script>
      ;(function (l) {
        var repoSegments = 'SubtitleFlow'.split('/').length
        var pathSegments = l.pathname.split('/').length - 1 + repoSegments
        l.hash = ''
        l.href =
          l.origin +
          '/SubtitleFlow/' +
          '?/' +
          l.pathname.slice(1).split('/').slice(pathSegments).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
