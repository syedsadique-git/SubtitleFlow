<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SubtitleFlow</title>
    <!--
      SPA deep-link fallback for GitHub Pages.

      GitHub Pages serves static files only, so a refresh of a client-side
      route like /SubtitleFlow/pricing would normally 404. This page catches
      those requests, encodes the intended path in sessionStorage, and redirects
      to the app root, where index.html restores it so React Router can take over.
    -->
    <script>
      ;(function (l) {
        var repo = 'SubtitleFlow'
        var repoParts = repo.split('/').length
        var route = l.pathname.split('/').slice(1 + repoParts).join('/')
        sessionStorage.setItem('sf-redirect', l.origin + '/' + repo + '/' + route + l.search + l.hash)
        l.href = l.origin + '/' + repo + '/'
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
