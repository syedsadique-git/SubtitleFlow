<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/SubtitleFlow/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SubtitleFlow - AI-Powered Real-Time Subtitle Translation</title>
    <meta name="description" content="Understand any video in any language with AI-powered real-time subtitle translation. Browser extension for Chrome, Edge, Firefox, and Brave." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      if (window.location.hostname === 'syedsadique-git.github.io') {
        var l = document.createElement('link')
        l.rel = 'stylesheet'
        l.href = '/SubtitleFlow/assets/index.css'
        document.head.appendChild(l)
      }
    </script>
    <script>
      (function () {
        var redirect = sessionStorage.getItem('sf-redirect')
        if (redirect && redirect !== window.location.href) {
          sessionStorage.removeItem('sf-redirect')
          history.replaceState(null, '', redirect)
        }
      })()
    </script>
    <script type="module" crossorigin src="/SubtitleFlow/assets/index.js"></script>
    <link rel="stylesheet" crossorigin href="/SubtitleFlow/assets/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      if (window.location.hostname === 'syedsadique-git.github.io') {
        var s = document.createElement('script')
        s.type = 'module'
        s.src = '/SubtitleFlow/assets/index.js'
        document.body.appendChild(s)
      }
    </script>
  </body>
</html>
